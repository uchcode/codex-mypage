<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自己紹介</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 1em;
      line-height: 1.6;
    }
    .profile {
      max-width: 600px;
      margin: 0 auto;
    }
    img {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }
    @media (min-width: 600px) {
      .profile {
        display: flex;
        align-items: center;
      }
      .profile img {
        width: 200px;
        margin-right: 1em;
      }
    }
  </style>
</head>
<body>
  <div class="profile">
    <img src="https://via.placeholder.com/300" alt="プロフィール写真">
    <div>
      <h1>田中 太郎</h1>
      <h2>趣味</h2>
      <ul>
        <li>読書</li>
        <li>旅行</li>
        <li>写真撮影</li>
      </ul>
    </div>
  </div>
</body>
</html>
